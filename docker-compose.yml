# PlanA — development infrastructure
# Usage: docker compose up -d
#
# Starts: PostgreSQL 16, Redis 7
# The web app and API run outside Docker in development (pnpm dev / go run).
#
# Schema management: the Go API runs golang-migrate on startup and applies all
# pending migrations automatically. Do NOT mount schema.sql here — the migration
# runner is the single source of truth for schema state.
#
# ⚠  If you previously ran this file with the old schema.sql initdb mount, you
# must destroy the existing volume before restarting:
#   docker compose down -v && docker compose up -d

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plana
      POSTGRES_USER: plana
      POSTGRES_PASSWORD: plana
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plana -d plana"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local LLM backend — bundled with PlanA so AI features (acceptance criteria,
  # task decomposition, sprint goals, release notes, executive summaries) run
  # without any external API key. Default model is gemma4:26b.
  #
  # Opt-in: docker compose --profile local-ai up -d
  # First run: docker exec -it $(docker compose ps -q ollama) ollama pull gemma4:26b
  #
  # Point the API at it by adding to your .env:
  #   AI_DEFAULT_PROVIDER=ollama
  #   AI_DEFAULT_MODEL=gemma4:26b
  #   AI_DEFAULT_ENDPOINT=http://localhost:11434
  #   AI_DEFAULT_NUM_CTX=16384
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - local-ai
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      # Pin Ollama to a single GPU. gemma4:26b (17 GB Q4) fits comfortably
      # in a 24 GB card, and most deployments only have one GPU anyway.
      # Splitting the model across multiple GPUs adds sync overhead without
      # buying capacity. To use a larger model that needs >24 GB, raise
      # `count` below and remove this env var.
      CUDA_VISIBLE_DEVICES: "0"
    # GPU passthrough — falls back to CPU if the host has no NVIDIA runtime.
    # Install NVIDIA Container Toolkit on the host to enable.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  ollama_data:
