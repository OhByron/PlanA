# PlanA — development infrastructure
# Usage: docker compose up -d
#
# Starts: PostgreSQL 16, Electric SQL sync service, Redis 7, Meilisearch
# The web app and API run outside Docker in development (pnpm dev / go run).
#
# Schema management: the Go API runs golang-migrate on startup and applies all
# pending migrations automatically. Do NOT mount schema.sql here — the migration
# runner is the single source of truth for schema state.
#
# ⚠  If you previously ran this file with the old schema.sql initdb mount, you
# must destroy the existing volume before restarting:
#   docker compose down -v && docker compose up -d

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plana
      POSTGRES_USER: plana
      POSTGRES_PASSWORD: plana
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # wal_level=logical is required for Electric SQL sync
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plana -d plana"]
      interval: 5s
      timeout: 5s
      retries: 5

  electric:
    image: electricsql/electric:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://plana:plana@postgres:5432/plana
      ELECTRIC_INSECURE: "true"   # dev only — removes auth requirement on sync API
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: masterkey
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
