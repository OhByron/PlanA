name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript — typecheck all packages and apps
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck

  # ---------------------------------------------------------------------------
  # TypeScript — lint
  # ---------------------------------------------------------------------------
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint

  # ---------------------------------------------------------------------------
  # Go — build, vet, test
  # ---------------------------------------------------------------------------
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Build
        working-directory: apps/api
        run: go build ./...

      - name: Vet
        working-directory: apps/api
        run: go vet ./...

      - name: Test
        working-directory: apps/api
        run: go test -race ./...
