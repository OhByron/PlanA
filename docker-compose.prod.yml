# PlanA — production / self-hosted full-stack
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Set DOMAIN=yourdomain.com in .env.prod for automatic HTTPS via Let's Encrypt.
# Without DOMAIN, Caddy serves on HTTP (localhost).

services:

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - api
      - web

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env.prod}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env.prod}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.prod}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_BASE_URL: ${PUBLIC_URL:-http://localhost}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost}
      ALLOWED_ORIGINS: ${PUBLIC_URL:-http://localhost}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ENV: production
      PORT: "8080"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_URL:-http://localhost}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  # Override dev-compose ports: in prod these services are only reached
  # via the internal Docker network — no need to expose them to the host.
  postgres:
    ports: !override
      - "127.0.0.1:5432:5432"

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.prod}
    ports: !override
      - "127.0.0.1:6379:6379"

  backup:
    build:
      context: .
      dockerfile: infra/docker/backup.Dockerfile
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.prod}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
      PGDATABASE: ${POSTGRES_DB:?Set POSTGRES_DB in .env.prod}
      BACKUP_DIR: /backups
      RETENTION_DAYS: "30"
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
  backup_data:
