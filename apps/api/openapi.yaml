openapi: 3.0.3
info:
  title: PlanA API
  description: Agile project management platform API
  version: 1.0.0
  contact:
    name: PlanA

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.plana.app
    description: Production (configurable)

tags:
  - name: Auth
    description: Authentication and OAuth flows
  - name: Users
    description: Current user profile and preferences
  - name: Organizations
    description: Organization management
  - name: Teams
    description: Team management within organizations
  - name: Projects
    description: Project CRUD and configuration
  - name: WorkItems
    description: Stories, bugs, tasks, and sub-tasks
  - name: Epics
    description: Epic management within projects
  - name: Sprints
    description: Sprint planning, tracking, and burndown
  - name: Dependencies
    description: Work item, epic, and sprint dependencies
  - name: Comments
    description: Work item comments
  - name: Links
    description: External links on work items
  - name: Estimation
    description: Planning poker / story point voting
  - name: Notifications
    description: User notifications
  - name: Activity
    description: Activity feed and audit log
  - name: VCS
    description: Version control connections, branches, PRs, commits
  - name: WorkflowStates
    description: Org-level workflow state definitions
  - name: TransitionHooks
    description: Workflow transition automation hooks
  - name: Reports
    description: Report generation
  - name: TestResults
    description: Test result ingestion and summaries
  - name: Share
    description: Stakeholder dashboard share tokens
  - name: Webhooks
    description: Incoming VCS webhooks (GitHub/GitLab)
  - name: WebSocket
    description: Real-time event streaming
  - name: Initiatives
    description: Cross-team initiatives scoped to an org
  - name: AI
    description: AI-powered suggestions
  - name: AcceptanceCriteria
    description: Work item acceptance criteria
  - name: ProjectMembers
    description: Project member management
  - name: Invitations
    description: Email invitations
  - name: Licence
    description: Licence management
  - name: ProjectWorkflowStates
    description: Project-level workflow state subsets
  - name: Health
    description: Health check

security:
  - BearerAuth: []

paths:
  # =========================================================================
  # Health
  # =========================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # =========================================================================
  # Auth
  # =========================================================================
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate with email and password
      security: []
      operationId: passwordLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/github:
    post:
      tags: [Auth]
      summary: Initiate GitHub OAuth flow (returns redirect URL)
      security: []
      operationId: githubInitiate
      responses:
        "200":
          description: OAuth URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /api/auth/github/callback:
    get:
      tags: [Auth]
      summary: GitHub OAuth callback (browser redirect)
      security: []
      operationId: githubCallback
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend with token

  /api/auth/google:
    post:
      tags: [Auth]
      summary: Initiate Google OAuth flow (returns redirect URL)
      security: []
      operationId: googleInitiate
      responses:
        "200":
          description: OAuth URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /api/auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback (browser redirect)
      security: []
      operationId: googleCallback
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend with token

  /api/auth/logout:
    delete:
      tags: [Auth]
      summary: Invalidate current session
      operationId: logout
      responses:
        "204":
          description: Session invalidated

  /api/auth/dev-login:
    post:
      tags: [Auth]
      summary: Dev-only bypass login (development environment only)
      security: []
      operationId: devLogin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: Dev login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  # =========================================================================
  # Users
  # =========================================================================
  /api/me:
    get:
      tags: [Users]
      summary: Get current user profile
      operationId: getMe
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/work-items:
    get:
      tags: [Users]
      summary: List all active work items assigned to the current user
      operationId: myWorkItems
      responses:
        "200":
          description: Work items assigned to user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkItem"

  /api/me/preferences:
    patch:
      tags: [Users]
      summary: Update user preferences (e.g. language)
      operationId: updatePreferences
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                  example: en
      responses:
        "200":
          description: Preferences updated

  # =========================================================================
  # Licence
  # =========================================================================
  /api/licence:
    get:
      tags: [Licence]
      summary: Get current licence status
      security: []
      operationId: getLicence
      responses:
        "200":
          description: Licence info
    post:
      tags: [Licence]
      summary: Activate a licence key
      security: []
      operationId: activateLicence
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
      responses:
        "200":
          description: Licence activated

  # =========================================================================
  # Notifications
  # =========================================================================
  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for current user
      operationId: listNotifications
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /api/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count
      operationId: unreadNotificationCount
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /api/notifications/mark-all-read:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      responses:
        "204":
          description: All marked read

  # =========================================================================
  # Organizations
  # =========================================================================
  /api/orgs:
    get:
      tags: [Organizations]
      summary: List organizations the current user belongs to
      operationId: listOrgs
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      tags: [Organizations]
      summary: Create a new organization
      operationId: createOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /api/orgs/{orgID}:
    parameters:
      - $ref: "#/components/parameters/orgID"
    get:
      tags: [Organizations]
      summary: Get organization by ID
      operationId: getOrg
      responses:
        "200":
          description: Organization detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Organizations]
      summary: Update organization
      operationId: updateOrg
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
    delete:
      tags: [Organizations]
      summary: Delete organization
      operationId: deleteOrg
      responses:
        "204":
          description: Deleted

  /api/orgs/{orgID}/archive:
    parameters:
      - $ref: "#/components/parameters/orgID"
    post:
      tags: [Organizations]
      summary: Archive an organization
      operationId: archiveOrg
      responses:
        "200":
          description: Archived

  /api/orgs/{orgID}/unarchive:
    parameters:
      - $ref: "#/components/parameters/orgID"
    post:
      tags: [Organizations]
      summary: Unarchive an organization
      operationId: unarchiveOrg
      responses:
        "200":
          description: Unarchived

  # =========================================================================
  # Workflow States (org-level)
  # =========================================================================
  /api/orgs/{orgID}/workflow-states:
    parameters:
      - $ref: "#/components/parameters/orgID"
    get:
      tags: [WorkflowStates]
      summary: List all workflow states for an organization
      operationId: listWorkflowStates
      responses:
        "200":
          description: Ordered list of workflow states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowState"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [WorkflowStates]
      summary: Create a new workflow state
      operationId: createWorkflowState
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowStateRequest"
      responses:
        "201":
          description: Workflow state created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowState"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/orgs/{orgID}/workflow-states/reorder:
    parameters:
      - $ref: "#/components/parameters/orgID"
    post:
      tags: [WorkflowStates]
      summary: Reorder workflow states
      operationId: reorderWorkflowStates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Ordered list of state IDs
      responses:
        "200":
          description: Reordered

  /api/orgs/{orgID}/workflow-states/{stateID}:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - name: stateID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [WorkflowStates]
      summary: Update a workflow state
      operationId: updateWorkflowState
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
                color:
                  type: string
                position:
                  type: integer
                is_initial:
                  type: boolean
                is_terminal:
                  type: boolean
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowState"
    delete:
      tags: [WorkflowStates]
      summary: Delete a workflow state
      operationId: deleteWorkflowState
      responses:
        "204":
          description: Deleted

  # =========================================================================
  # Transition Hooks (org-level)
  # =========================================================================
  /api/orgs/{orgID}/transition-hooks:
    parameters:
      - $ref: "#/components/parameters/orgID"
    get:
      tags: [TransitionHooks]
      summary: List transition hooks
      operationId: listTransitionHooks
      responses:
        "200":
          description: Hook list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransitionHook"
    post:
      tags: [TransitionHooks]
      summary: Create a transition hook
      operationId: createTransitionHook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from_state_id:
                  type: string
                  format: uuid
                to_state_id:
                  type: string
                  format: uuid
                action:
                  type: string
      responses:
        "201":
          description: Hook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransitionHook"

  /api/orgs/{orgID}/transition-hooks/{hookID}:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - name: hookID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [TransitionHooks]
      summary: Delete a transition hook
      operationId: deleteTransitionHook
      responses:
        "204":
          description: Deleted

  # =========================================================================
  # Initiatives (org-level)
  # =========================================================================
  /api/orgs/{orgID}/initiatives:
    parameters:
      - $ref: "#/components/parameters/orgID"
    get:
      tags: [Initiatives]
      summary: List initiatives for an organization
      operationId: listInitiatives
      responses:
        "200":
          description: Initiative list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Initiative"
    post:
      tags: [Initiatives]
      summary: Create an initiative
      operationId: createInitiative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Initiative created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"

  /api/orgs/{orgID}/initiatives/{initiativeID}:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - name: initiativeID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Initiatives]
      summary: Get initiative by ID
      operationId: getInitiative
      responses:
        "200":
          description: Initiative detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
    patch:
      tags: [Initiatives]
      summary: Update an initiative
      operationId: updateInitiative
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
    delete:
      tags: [Initiatives]
      summary: Delete an initiative
      operationId: deleteInitiative
      responses:
        "204":
          description: Deleted

  # =========================================================================
  # Teams
  # =========================================================================
  /api/orgs/{orgID}/teams:
    parameters:
      - $ref: "#/components/parameters/orgID"
    get:
      tags: [Teams]
      summary: List teams in an organization
      operationId: listTeams
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      tags: [Teams]
      summary: Create a team
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /api/orgs/{orgID}/teams/{teamID}:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - $ref: "#/components/parameters/teamID"
    get:
      tags: [Teams]
      summary: Get team by ID
      operationId: getTeam
      responses:
        "200":
          description: Team detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    patch:
      tags: [Teams]
      summary: Update a team
      operationId: updateTeam
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
    delete:
      tags: [Teams]
      summary: Delete a team
      operationId: deleteTeam
      responses:
        "204":
          description: Deleted

  /api/orgs/{orgID}/teams/{teamID}/members:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - $ref: "#/components/parameters/teamID"
    get:
      tags: [Teams]
      summary: List team members
      operationId: listTeamMembers
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # =========================================================================
  # Projects (under team hierarchy)
  # =========================================================================
  /api/orgs/{orgID}/teams/{teamID}/projects:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - $ref: "#/components/parameters/teamID"
    get:
      tags: [Projects]
      summary: List projects for a team
      operationId: listTeamProjects
      parameters:
        - name: include_archived
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [Projects]
      summary: Create a project under a team
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/orgs/{orgID}/teams/{teamID}/projects/import:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - $ref: "#/components/parameters/teamID"
    post:
      tags: [Projects]
      summary: Import a project from JSON export
      operationId: importProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Project imported

  /api/orgs/{orgID}/teams/{teamID}/projects/{projectID}:
    parameters:
      - $ref: "#/components/parameters/orgID"
      - $ref: "#/components/parameters/teamID"
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [Projects]
      summary: Get project by ID (team-scoped)
      operationId: getTeamProject
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      tags: [Projects]
      summary: Update project (team-scoped)
      operationId: updateTeamProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      tags: [Projects]
      summary: Delete project (team-scoped)
      operationId: deleteTeamProject
      responses:
        "204":
          description: Deleted

  # =========================================================================
  # Projects (shortcut routes - no org/team prefix)
  # =========================================================================
  /api/projects/{projectID}:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [Projects]
      summary: Get project by ID
      operationId: getProject
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: Update project settings
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{projectID}/archive:
    parameters:
      - $ref: "#/components/parameters/projectID"
    post:
      tags: [Projects]
      summary: Archive a project (soft-delete)
      operationId: archiveProject
      responses:
        "200":
          description: Project archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /api/projects/{projectID}/unarchive:
    parameters:
      - $ref: "#/components/parameters/projectID"
    post:
      tags: [Projects]
      summary: Unarchive a project
      operationId: unarchiveProject
      responses:
        "200":
          description: Project unarchived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /api/projects/{projectID}/export:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [Projects]
      summary: Export project as JSON
      operationId: exportProject
      responses:
        "200":
          description: Full project export
          content:
            application/json:
              schema:
                type: object

  # =========================================================================
  # Work Items
  # =========================================================================
  /api/projects/{projectID}/work-items:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [WorkItems]
      summary: List work items for a project with optional filters
      operationId: listWorkItems
      parameters:
        - name: type
          in: query
          description: Filter by item type (story, bug, task)
          schema:
            type: string
            enum: [story, bug, task]
        - name: status
          in: query
          description: Filter by workflow state slug
          schema:
            type: string
        - name: workflow_state_id
          in: query
          description: Filter by workflow state ID
          schema:
            type: string
            format: uuid
        - name: epic_id
          in: query
          description: Filter by epic ID
          schema:
            type: string
            format: uuid
        - name: assignee_id
          in: query
          description: Filter by assignee (project member ID)
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/page_size"
      responses:
        "200":
          description: Paginated work item list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginationWrapper"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/WorkItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [WorkItems]
      summary: Create a new work item (story, bug, or task)
      operationId: createWorkItem
      requestBody:
        required: true
        content:
