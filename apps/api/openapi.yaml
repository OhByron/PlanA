      operationId: listWorkItemCommits
      responses:
        "200":
          description: Commit list

  /api/work-items/{workItemID}/create-branch:
    parameters:
      - $ref: "#/components/parameters/workItemID"
    post:
      tags: [VCS]
      summary: Create a branch for a work item on the linked repository
      operationId: createBranch
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                connection_id:
                  type: string
                  format: uuid
                branch_name:
                  type: string
      responses:
        "201":
          description: Branch created

  # =========================================================================
  # Test Results
  # =========================================================================
  /api/projects/{projectID}/test-results:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [TestResults]
      summary: List test results for a project
      operationId: listTestResults
      responses:
        "200":
          description: Test result list

  /api/projects/{projectID}/test-results/{resultID}:
    parameters:
      - $ref: "#/components/parameters/projectID"
      - name: resultID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [TestResults]
      summary: Get a single test result
      operationId: getTestResult
      responses:
        "200":
          description: Test result detail

  /api/projects/{projectID}/test-results/junit:
    parameters:
      - $ref: "#/components/parameters/projectID"
    post:
      tags: [TestResults]
      summary: Import test results from JUnit XML
      operationId: importJUnit
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Test results imported

  /api/projects/{projectID}/test-results/webhook:
    parameters:
      - $ref: "#/components/parameters/projectID"
    post:
      tags: [TestResults]
      summary: Receive test results via webhook
      operationId: testResultWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Test results received

  # =========================================================================
  # Project Workflow States (subset)
  # =========================================================================
  /api/projects/{projectID}/workflow-states:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [ProjectWorkflowStates]
      summary: List workflow states enabled for this project
      operationId: listProjectWorkflowStates
      responses:
        "200":
          description: Workflow state list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowState"

  /api/projects/{projectID}/workflow-states/subset:
    parameters:
      - $ref: "#/components/parameters/projectID"
    post:
      tags: [ProjectWorkflowStates]
      summary: Set the subset of org workflow states used by this project
      operationId: setProjectWorkflowStateSubset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Subset updated

  # =========================================================================
  # VCS Connections
  # =========================================================================
  /api/projects/{projectID}/vcs/summary:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [VCS]
      summary: Bulk VCS summary for board cards (PR/branch counts per work item)
      operationId: vcsBulkSummary
      responses:
        "200":
          description: VCS summary map

  /api/projects/{projectID}/vcs/connections:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [VCS]
      summary: List VCS connections for a project
      operationId: listVCSConnections
      responses:
        "200":
          description: Connection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VCSConnection"
    post:
      tags: [VCS]
      summary: Create a VCS connection (link a repository)
      operationId: createVCSConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVCSConnectionRequest"
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCSConnection"

  /api/projects/{projectID}/vcs/connections/{connectionID}:
    parameters:
      - $ref: "#/components/parameters/projectID"
      - $ref: "#/components/parameters/connectionID"
    get:
      tags: [VCS]
      summary: Get VCS connection by ID
      operationId: getVCSConnection
      responses:
        "200":
          description: Connection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCSConnection"
    patch:
      tags: [VCS]
      summary: Update a VCS connection
      operationId: updateVCSConnection
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                default_branch:
                  type: string
                token:
                  type: string
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VCSConnection"
    delete:
      tags: [VCS]
      summary: Delete a VCS connection
      operationId: deleteVCSConnection
      responses:
        "204":
          description: Deleted

  /api/projects/{projectID}/vcs/connections/{connectionID}/test:
    parameters:
      - $ref: "#/components/parameters/projectID"
      - $ref: "#/components/parameters/connectionID"
    post:
      tags: [VCS]
      summary: Test a VCS connection (verify credentials)
      operationId: testVCSConnection
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string

  # =========================================================================
  # Share Tokens (stakeholder dashboards)
  # =========================================================================
  /api/projects/{projectID}/share-tokens:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [Share]
      summary: List share tokens for a project
      operationId: listShareTokens
      responses:
        "200":
          description: Share token list
    post:
      tags: [Share]
      summary: Create a share token
      operationId: createShareToken
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
      responses:
        "201":
          description: Share token created

  /api/projects/{projectID}/share-tokens/{tokenID}/revoke:
    parameters:
      - $ref: "#/components/parameters/projectID"
      - name: tokenID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Share]
      summary: Revoke a share token
      operationId: revokeShareToken
      responses:
        "204":
          description: Revoked

  /api/share/{token}/dashboard:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Share]
      summary: Get stakeholder dashboard data (public, token-authenticated)
      security: []
      operationId: shareDashboard
      responses:
        "200":
          description: Dashboard data

  # =========================================================================
  # Reports
  # =========================================================================
  /api/projects/{projectID}/reports/generate:
    parameters:
      - $ref: "#/components/parameters/projectID"
    post:
      tags: [Reports]
      summary: Generate a project report
      operationId: generateReport
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: Report type (e.g. velocity, burndown, status)
                format:
                  type: string
                  enum: [json, csv]
      responses:
        "200":
          description: Generated report

  # =========================================================================
  # Activity Feed
  # =========================================================================
  /api/projects/{projectID}/activity:
    parameters:
      - $ref: "#/components/parameters/projectID"
    get:
      tags: [Activity]
      summary: Get activity feed for a project
      operationId: listProjectActivity
      parameters:
        - name: work_item_id
          in: query
          schema:
            type: string
            format: uuid
        - name: event_type
          in: query
          schema:
            type: string
        - name: actor_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/page_size"
      responses:
        "200":
          description: Paginated activity feed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginationWrapper"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ActivityEntry"

  # =========================================================================
  # Invitations (public)
  # =========================================================================
  /api/invitations/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Invitations]
      summary: Get invitation details by token (public)
      security: []
      operationId: getInvitation
      responses:
        "200":
          description: Invitation detail

  /api/invitations/{token}/accept:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Invitations]
      summary: Accept an invitation (public)
      security: []
      operationId: acceptInvitation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Invitation accepted

  # =========================================================================
  # VCS Webhooks (incoming, public)
  # =========================================================================
  /api/webhooks/github/{connectionID}:
    parameters:
      - $ref: "#/components/parameters/connectionID"
    post:
      tags: [Webhooks]
      summary: GitHub webhook receiver
      security: []
      operationId: handleGitHubWebhook
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed

  /api/webhooks/gitlab/{connectionID}:
    parameters:
      - $ref: "#/components/parameters/connectionID"
    post:
      tags: [Webhooks]
      summary: GitLab webhook receiver
      security: []
      operationId: handleGitLabWebhook
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed

  # =========================================================================
  # WebSocket
  # =========================================================================
  /api/ws:
    get:
      tags: [WebSocket]
      summary: WebSocket connection for real-time events
      description: |
        Upgrades to a WebSocket connection. Authentication via query parameter `?token=<jwt>`.
        Once connected, clients receive JSON events for subscribed channels (projects, sprints, work items).
        Send `{"type":"subscribe","channel":"project:<id>"}` to subscribe to a channel.
      security: []
      operationId: websocketUpgrade
      parameters:
        - name: token
          in: query
          required: true
          description: JWT token for authentication
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols (WebSocket upgrade)

components:
  # =========================================================================
  # Security Schemes
  # =========================================================================
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/auth/login or OAuth callback

  # =========================================================================
  # Parameters
  # =========================================================================
  parameters:
    orgID:
      name: orgID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    teamID:
      name: teamID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    projectID:
      name: projectID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    workItemID:
      name: workItemID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    epicID:
      name: epicID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    sprintID:
      name: sprintID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    connectionID:
      name: connectionID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    depID:
      name: depID
      in: path
      required: true
      schema:
        type: string
        format: uuid

    page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        default: 1
        minimum: 1

    page_size:
      name: page_size
      in: query
      description: Items per page
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200

  # =========================================================================
  # Responses
  # =========================================================================
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # =========================================================================
  # Schemas
  # =========================================================================
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: validation_error
        message:
          type: string
          example: "name is required"

    PaginationWrapper:
      type: object
      properties:
        total:
          type: integer
          description: Total matching items
        page:
          type: integer
        page_size:
          type: integer
        items:
          type: array
          items: {}

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT session token
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        avatar_url:
          type: string
          format: uri
          nullable: true
        language:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Initiative:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        methodology:
          type: string
          enum: [scrum, kanban]
        status:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        contact_name:
          type: string
          nullable: true
        contact_email:
          type: string
          format: email
          nullable: true
        contact_phone:
          type: string
          nullable: true
        sprint_duration_weeks:
          type: integer
          default: 2
        default_project_months:
          type: integer
        default_epic_weeks:
          type: integer
        archived_at:
          type: string
          format: date-time
          nullable: true
        retention_days:
          type: integer
        pr_open_transition_state_id:
          type: string
          format: uuid
          nullable: true
          description: Workflow state to transition to when a PR is opened
        pr_merge_transition_state_id:
          type: string
          format: uuid
          nullable: true
          description: Workflow state to transition to when a PR is merged
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        methodology:
          type: string
          enum: [scrum, kanban]
        due_date:
          type: string
          format: date
        contact_name:
          type: string
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        methodology:
          type: string
        status:
          type: string
        due_date:
          type: string
          format: date
        contact_name:
          type: string
        contact_email:
          type: string
        contact_phone:
          type: string
        sprint_duration_weeks:
          type: integer
        default_project_months:
          type: integer
        default_epic_weeks:
          type: integer
        retention_days:
          type: integer
        pr_open_transition_state_id:
          type: string
          format: uuid
          description: Set to empty string to clear
        pr_merge_transition_state_id:
          type: string
          format: uuid
          description: Set to empty string to clear

    ProjectMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        email:
          type: string
          format: email
        job_role:
          type: string
          enum: [pm, po, dev, qe, design]
        created_at:
          type: string
          format: date-time

    WorkItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item_number:
          type: integer
          nullable: true
          description: Project-scoped sequential number (e.g. PROJ-42)
        project_id:
          type: string
          format: uuid
        epic_id:
          type: string
          format: uuid
          nullable: true
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent work item ID for sub-tasks
        type:
          type: string
          enum: [story, bug, task]
        title:
          type: string
        description:
          type: object
          nullable: true
          description: Rich text content (TipTap JSON)
        workflow_state_id:
          type: string
          format: uuid
        is_cancelled:
          type: boolean
        state_name:
          type: string
          description: Joined from workflow_states
        state_slug:
          type: string
        state_color:
          type: string
          description: Hex color code
        state_position:
          type: integer
        state_is_terminal:
          type: boolean
        state_is_initial:
          type: boolean
        priority:
          type: string
          enum: [urgent, high, medium, low]
        assignee_id:
          type: string
          format: uuid
          nullable: true
          description: References a project_member ID
        story_points:
          type: integer
          nullable: true
        points_used:
          type: integer
          nullable: true
        labels:
          type: array
          items:
            type: string
        order_index:
          type: number
          format: double
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        target_date:
          type: string
          format: date
          nullable: true
        pre_conditions:
          type: object
          nullable: true
          description: Rich text (TipTap JSON)
        post_conditions:
          type: object
          nullable: true
          description: Rich text (TipTap JSON)
        design_ready:
          type: boolean
        design_link:
          type: string
          format: uri
          nullable: true
        is_blocked:
          type: boolean
        blocked_reason:
          type: string
          nullable: true
        source_test_result_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateWorkItemRequest:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [story, bug, task]
        title:
          type: string
        description:
          type: object
          description: Rich text content (TipTap JSON)
        epic_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        priority:
          type: string
          enum: [urgent, high, medium, low]
          default: medium
        assignee_id:
          type: string
          format: uuid
        story_points:
          type: integer
        labels:
          type: array
          items:
            type: string
        order_index:
          type: number
          format: double
        start_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        source_test_result_id:
          type: string
          format: uuid

    UpdateWorkItemRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: object
          description: Rich text content (TipTap JSON)
        type:
          type: string
          enum: [story, bug, task]
        workflow_state_id:
          type: string
          format: uuid
        is_cancelled:
          type: boolean
        priority:
          type: string
          enum: [urgent, high, medium, low]
        epic_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
        story_points:
          type: integer
        points_used:
          type: integer
        labels:
          type: array
          items:
            type: string
        order_index:
          type: number
          format: double
        start_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        target_date:
          type: string
          format: date
        pre_conditions:
          type: object
        post_conditions:
          type: object
        design_ready:
          type: boolean
        design_link:
          type: string
        is_blocked:
          type: boolean
        blocked_reason:
          type: string

    Epic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        item_number:
          type: integer
          nullable: true
        project_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, in_progress, closed]
        priority:
          type: string
          enum: [urgent, high, medium, low]
        order_index:
          type: number
          format: double
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        target_date:
          type: string
          format: date
          nullable: true
        initiative_id:
          type: string
          format: uuid
          nullable: true
        assignee_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
